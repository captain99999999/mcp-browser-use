    - severity: medium
      description: "stealth JS payload 可能无法完全绕过 Google 的高级检测"
      mitigation: "用户需要配合 profile 持久化（Cookie/历史）+ 随机延迟 + 鼠标移动多重策略"
    - severity: low
      description: "winserver 的 D:\\browser-projects\\路径可能不存在"
      mitigation: "配置中说明路径，部署前需手动创建目录"

